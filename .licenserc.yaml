header:
  license:
    spdx-id: Apache-2.0
    copyright-owner: Intel Corporation
    copyright-year: '2018-2026'
    content: |
      Copyright (C) 2018-2026 Intel Corporation
      SPDX-License-Identifier: Apache-2.0
    pattern: |
      Copyright \(C\) 2018-2026 Intel Corporation
      SPDX-License-Identifier: Apache-2.0

  paths:
    - '**'

  paths-ignore:
    - 'LICENSE'
    # JSON files do not support comments, not a source file.
    - '**/*.json'
    # Sample document content used by the RAG example, not a source file.
    - 'modules/openvino-langchain/sample/data/document_sample.txt'
    # Third-party PointPillars fork; keep original upstream notices intact.
    - 'modules/3d/pointPillars/**'
    # Third-party CDPN_ICCV2019_ZhigangLi clone at runtime.
    - 'modules/3d/CDPN/cdpn_repo/**'
    # Third-party Ollama tree with vendored llama.cpp/ggml; keep upstream notices intact.
    - 'modules/ollama_openvino/**'
    # Third-party license inventory, not a source file.
    - 'third-party-programs.txt'

  comment: never
