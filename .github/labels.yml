# Single source of truth for repository labels.
# Synced by .github/workflows/labels.yml via crazy-max/ghaction-github-labeler.
# Any label NOT listed here is deleted from the repository on sync.

- name: "bug"
  color: "#d73a4a"
  description: "Something isn't working"

# category: labels map to modules under modules/ (see .github/labeler.yml).
# 'build' and 'CI' are path-based (cmake / infra) rather than module-based.

- name: "category: 3D"
