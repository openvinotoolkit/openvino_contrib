# Dependabot config for openvino_contrib.
#
# - `/modules/**/*` globstar matches manifests at any depth under modules/.
# - `applies-to: security-updates` requires "Dependabot security updates"
#   (+ Dependency graph + alerts) enabled in repo settings; the file alone
#   does not enable security updates.
# - Only the `dependencies` label is auto-created; ecosystem labels must exist
#   in the repo or Dependabot ignores them.
# - Security updates ignore `open-pull-requests-limit`.

version: 2

updates:
  # pip — requirements*.txt and setup.py
  - package-ecosystem: "pip"
    directories:
      - "/modules/**/*"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps(pip)"
    groups:
      pip-security:
        applies-to: security-updates
        patterns:
          - "*"
      pip-version:
        applies-to: version-updates
        patterns:
          - "*"

  # npm — package.json lockfiles
  - package-ecosystem: "npm"
    directories:
      - "/modules/**/*"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "deps(npm)"
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
      npm-version:
        applies-to: version-updates
        patterns:
          - "*"

  # gomod — ollama_openvino
  - package-ecosystem: "gomod"
    directory: "/modules/ollama_openvino"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "deps(gomod)"
    groups:
      gomod-security:
        applies-to: security-updates
        patterns:
          - "*"
      gomod-version:
        applies-to: version-updates
        patterns:
          - "*"

  # gradle — build.gradle and version catalogs (Java/Kotlin)
  - package-ecosystem: "gradle"
    directories:
      - "/modules/**/*"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "java"
    commit-message:
      prefix: "deps(gradle)"
    groups:
      gradle-security:
        applies-to: security-updates
        patterns:
          - "*"
      gradle-version:
        applies-to: version-updates
        patterns:
          - "*"

  # docker — Dockerfile base images
  - package-ecosystem: "docker"
    directories:
      - "/modules/**/*"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps(docker)"
    groups:
      docker-security:
        applies-to: security-updates
        patterns:
          - "*"
      docker-version:
        applies-to: version-updates
        patterns:
          - "*"

  # github-actions — workflows under .github/workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps(actions)"
    groups:
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
      actions-version:
        applies-to: version-updates
        patterns:
          - "*"
