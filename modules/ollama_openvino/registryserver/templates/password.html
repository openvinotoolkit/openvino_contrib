{{define "title"}}Change password · Ollama Registry{{end}}
{{define "content"}}
<div style="max-width:380px;margin:40px auto">
  <h1 class="title">Change password</h1>

  {{if .MustChange}}
  <div class="box" style="border-color:#f0d9a8;background:#fdf6e3;color:#8a6d1a;padding:10px 14px">
    Your account still uses the default password. Please set a new password to continue.
  </div>
  {{end}}

  {{if .Error}}
  <div class="box" style="border-color:#f3c2c2;background:#fdeaea;color:#b3261e;padding:10px 14px">{{.Error}}</div>
  {{end}}

  <form method="POST" action="/auth/password" class="box">
    <label style="display:block;margin-bottom:12px">
      <div class="subtitle" style="margin:0 0 4px">Current password</div>
      <input name="current_password" type="password" autocomplete="current-password" autofocus required
             style="width:100%;padding:8px 10px;border:1px solid var(--border-strong);border-radius:6px;font-size:15px">
    </label>
    <label style="display:block;margin-bottom:12px">
      <div class="subtitle" style="margin:0 0 4px">New password <span class="mono">(min 8 chars)</span></div>
      <input name="new_password" type="password" autocomplete="new-password" required
             style="width:100%;padding:8px 10px;border:1px solid var(--border-strong);border-radius:6px;font-size:15px">
    </label>
    <label style="display:block;margin-bottom:16px">
      <div class="subtitle" style="margin:0 0 4px">Confirm new password</div>
      <input name="confirm_password" type="password" autocomplete="new-password" required
             style="width:100%;padding:8px 10px;border:1px solid var(--border-strong);border-radius:6px;font-size:15px">
    </label>
    <button type="submit"
            style="width:100%;padding:10px;border:0;border-radius:6px;background:var(--accent);color:#fff;font-size:15px;cursor:pointer">
      Update password
    </button>
  </form>
</div>
{{end}}
