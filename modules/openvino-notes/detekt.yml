build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: true

complexity:
  TooManyFunctions:
    active: false
  LongMethod:
    active: false
  LongParameterList:
    active: false
  CyclomaticComplexMethod:
    active: false

exceptions:
  TooGenericExceptionCaught:
    active: false
  SwallowedException:
    active: false

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: false
  ReturnCount:
    active: false
  UnusedParameter:
    active: false
