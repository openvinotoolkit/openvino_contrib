name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight
    uses: ./.github/workflows/preflight.yml
    permissions:
      contents: read

  dependency-review:
    name: Dependency Review
    needs: preflight
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/supply-chain.yml
    permissions:
      contents: read
      pull-requests: read

  secrets:
    name: Secrets
    needs: preflight
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read
      security-events: write

  build-quality:
    name: Build Quality
    needs: preflight
    uses: ./.github/workflows/quality.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write
      security-events: write

  codeql:
    name: CodeQL
    needs:
      - preflight
      - build-quality
      - secrets
    if: needs.preflight.outputs.run_codeql == 'true'
    uses: ./.github/workflows/codeql.yml
    permissions:
      actions: read
      contents: read
      security-events: write

  release:
    name: Release
    needs:
      - preflight
      - build-quality
    if: needs.preflight.outputs.run_release == 'true'
    uses: ./.github/workflows/release.yml
    secrets: inherit
    permissions:
      contents: read

  android-tests:
    name: Android Tests
    needs:
      - preflight
      - build-quality
    if: needs.preflight.outputs.run_android_tests == 'true'
    uses: ./.github/workflows/android-tests.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write
