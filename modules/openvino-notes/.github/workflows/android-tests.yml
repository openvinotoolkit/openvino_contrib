name: Android Tests

on:
  workflow_call:

env:
  ANDROID_API_LEVEL: "37.0"
  ANDROID_BUILD_TOOLS: "37.0.0"
  JAVA_VERSION: "21"

jobs:
  emulator-validation:
    name: Emulator Validation
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up toolchain
        uses: ./.github/actions/setup-android-gradle
        with:
          java-version: ${{ env.JAVA_VERSION }}
          android-api-level: ${{ env.ANDROID_API_LEVEL }}
          android-build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Validate debug APK tasks
        shell: bash
        run: bash .github/scripts/android/validate_debug_apk_tasks.sh

  android-tests:
    name: Android Tests (${{ matrix.emulator_name }})
    needs: emulator-validation
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - emulator_name: x86_64
            runs_on: ubuntu-24.04
            api_level: 34
            target: default
            arch: x86_64
            profile: pixel_7
            emulator_options: -no-snapshot-save -no-window -noaudio -no-boot-anim -gpu swiftshader_indirect -camera-back none -camera-front none
            test_suffix: x86
            suite_name: emulator-x86_64
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: debug-apks-*
          path: build-artifacts

      - name: Enable KVM when available
        if: runner.os == 'Linux'
        shell: bash
        run: bash .github/scripts/android/enable_kvm_if_available.sh

      - name: Restore emulator system image cache
        uses: actions/cache@v4.2.4
        with:
          path: /usr/local/lib/android/sdk/system-images/android-${{ matrix.api_level }}/${{ matrix.target }}/${{ matrix.arch }}
          key: android-emulator-system-image-${{ runner.os }}-${{ matrix.api_level }}-${{ matrix.target }}-${{ matrix.arch }}
          restore-keys: |
            android-emulator-system-image-${{ runner.os }}-${{ matrix.api_level }}-${{ matrix.target }}-
            android-emulator-system-image-${{ runner.os }}-

      - name: Preinstall emulator system image
        shell: bash
        env:
          ANDROID_SYSTEM_IMAGE_PACKAGE: system-images;android-${{ matrix.api_level }};${{ matrix.target }};${{ matrix.arch }}
        run: bash .github/scripts/android/install_system_image_with_retry.sh

      - name: Run instrumentation on emulator
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          api-level: ${{ matrix.api_level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          profile: ${{ matrix.profile }}
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: ${{ matrix.emulator_options }}
          script: bash .github/scripts/android/run_all_instrumentation_variants.sh
        env:
          APK_ROOT_DIR: build-artifacts
          RESULTS_ROOT_DIR: android-test-results
          ANDROID_SERIAL: emulator-5554

      - name: Convert instrumentation output to JUnit
        if: always()
        shell: bash
        env:
          RESULTS_ROOT_DIR: android-test-results
          EMULATOR_SUITE_NAME: ${{ matrix.suite_name }}
        run: bash .github/scripts/android/convert_instrumentation_tree.sh

      - name: Upload android test artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: android-test-reports-${{ matrix.test_suffix }}
          if-no-files-found: ignore
          path: |
            emulator.log
            android-test-results/**
