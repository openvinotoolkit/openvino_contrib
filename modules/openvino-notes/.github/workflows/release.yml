# Release builds for the Notes Android app.
#
# Requires repository secrets (never commit keys):
#   ANDROID_RELEASE_KEYSTORE_BASE64, ANDROID_RELEASE_STORE_PASSWORD,
#   ANDROID_RELEASE_KEY_ALIAS, ANDROID_RELEASE_KEY_PASSWORD
#   GOOGLE_SERVICES_JSON_BASE64
# verify_release_signing.sh fails the job if any secret is missing.
# materialize_release_signing.sh writes app/keystore.properties + app/ci-release-signing.jks.
# materialize_google_services_json.sh writes ignored app/google-services.json from secrets on trusted builds.

name: Release

on:
  workflow_call:

env:
  ANDROID_API_LEVEL: "37.0"
  ANDROID_BUILD_TOOLS: "37.0.0"
  JAVA_VERSION: "21"

jobs:
  release-assemble:
    name: Release Assemble
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Explain unsigned fork pull request release build
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        shell: bash
        run: echo "Release signing secrets are unavailable to fork pull_request workflows; building unsigned release artifacts for CI."

      - name: Verify release signing secrets are configured
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: bash .github/scripts/release/verify_release_signing.sh

      - name: Materialize release signing from GitHub secrets
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: bash .github/scripts/release/materialize_release_signing.sh

      - name: Materialize Google services from GitHub secrets
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          GOOGLE_SERVICES_JSON_REQUIRED: "true"
        run: bash .github/scripts/release/materialize_google_services_json.sh

      - name: Set up toolchain
        uses: ./.github/actions/setup-android-gradle
        with:
          java-version: ${{ env.JAVA_VERSION }}
          android-api-level: ${{ env.ANDROID_API_LEVEL }}
          android-build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Assemble release variants
        shell: bash
        run: bash .github/scripts/release/assemble_release.sh

      - name: Upload release build artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-build-reports
          if-no-files-found: ignore
          path: |
            **/build/outputs/apk/release/**
            **/build/outputs/bundle/release/**

  release-lint:
    name: Release Lint
    needs: release-assemble
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Explain unsigned fork pull request release lint
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        shell: bash
        run: echo "Release signing secrets are unavailable to fork pull_request workflows; linting unsigned release variants for CI."

      - name: Verify release signing secrets are configured
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: bash .github/scripts/release/verify_release_signing.sh

      - name: Materialize release signing from GitHub secrets
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: bash .github/scripts/release/materialize_release_signing.sh

      - name: Materialize Google services from GitHub secrets
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          GOOGLE_SERVICES_JSON_REQUIRED: "true"
        run: bash .github/scripts/release/materialize_google_services_json.sh

      - name: Set up toolchain
        uses: ./.github/actions/setup-android-gradle
        with:
          java-version: ${{ env.JAVA_VERSION }}
          android-api-level: ${{ env.ANDROID_API_LEVEL }}
          android-build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Lint release variants
        shell: bash
        run: bash .github/scripts/release/lint_release.sh

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-lint-reports
          if-no-files-found: ignore
          path: |
            **/build/reports/lint-results-*.html
            **/build/reports/lint-results-*.xml
